<!--
  DESIGN SYSTEM - Include this in all templates for consistent styling
  Usage: {% include 'design-system.html' %}
  Or paste the <style> section into each template's <head>
-->

<style>
  :root {
    --bg: #0B0E14;
    --surface: #151A22;
    --surface-hover: #1A202A;
    --surface-light: #1F2937;
    --accent: #3B82F6;
    --accent-glow: rgba(59, 130, 246, 0.4);
    --accent-dark: #1E40AF;
    --success: #10B981;
    --success-bg: rgba(16, 185, 129, 0.1);
    --success-border: rgba(16, 185, 129, 0.2);
    --warn: #F59E0B;
    --warn-bg: rgba(245, 158, 11, 0.1);
    --warn-border: rgba(245, 158, 11, 0.2);
    --danger: #EF4444;
    --danger-bg: rgba(239, 68, 68, 0.1);
    --text-main: #FFFFFF;
    --text-light: #E2E8F0;
    --text-muted: #94A3B8;
    --text-dim: #64748B;
    --border: rgba(255, 255, 255, 0.08);
    --border-light: rgba(255, 255, 255, 0.12);
    --radius-lg: 16px;
    --radius: 8px;
    --radius-sm: 6px;
    --t: 0.2s ease;
    --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
    --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.15);
    --shadow-lg: 0 20px 40px rgba(0, 0, 0, 0.25);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background-color: var(--bg);
    color: var(--text-main);
    line-height: 1.6;
    overflow-x: hidden;
  }

  /* ===== TYPOGRAPHY ===== */
  h1, h2, h3, h4, h5, h6 { font-weight: 700; letter-spacing: -0.02em; }
  h1 { font-size: 2.5rem; }
  h2 { font-size: 2rem; }
  h3 { font-size: 1.3rem; }
  h4 { font-size: 1.1rem; }
  p { color: var(--text-light); }
  a { color: var(--accent); text-decoration: none; transition: color var(--t); }
  a:hover { color: #60A5FA; }

  /* ===== BUTTONS ===== */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 0.7rem 1.5rem;
    border-radius: var(--radius);
    font-weight: 600;
    font-size: 0.95rem;
    cursor: pointer;
    border: none;
    transition: all var(--t);
    text-decoration: none;
    gap: 0.5rem;
  }

  .btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  .btn-primary {
    background: var(--accent);
    color: white;
    box-shadow: 0 4px 14px var(--accent-glow);
  }
  .btn-primary:hover:not(:disabled) {
    background: var(--accent-dark);
    transform: translateY(-2px);
    box-shadow: 0 6px 20px var(--accent-glow);
  }

  .btn-secondary {
    background: var(--surface-hover);
    color: var(--text-main);
    border: 1px solid var(--border-light);
  }
  .btn-secondary:hover:not(:disabled) {
    background: var(--surface-light);
    border-color: var(--text-muted);
  }

  .btn-outline {
    background: transparent;
    color: var(--text-main);
    border: 1px solid var(--border);
  }
  .btn-outline:hover:not(:disabled) {
    background: var(--surface);
    border-color: var(--text-muted);
  }

  .btn-success {
    background: var(--success);
    color: white;
  }
  .btn-success:hover:not(:disabled) {
    background: #059669;
    transform: translateY(-2px);
  }

  .btn-danger {
    background: var(--danger);
    color: white;
  }
  .btn-danger:hover:not(:disabled) {
    background: #DC2626;
  }

  .btn-sm { padding: 0.5rem 1rem; font-size: 0.9rem; }
  .btn-lg { padding: 1rem 2rem; font-size: 1.1rem; }

  /* ===== CARDS ===== */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.5rem;
    transition: all var(--t);
  }

  .card:hover {
    border-color: var(--border-light);
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
  }

  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid var(--border);
  }

  .card-title {
    font-size: 1.1rem;
    font-weight: 700;
  }

  .card-meta {
    font-size: 0.85rem;
    color: var(--text-muted);
  }

  /* ===== FORMS ===== */
  input, textarea, select {
    width: 100%;
    padding: 0.75rem;
    background: var(--surface-light);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text-main);
    font-family: inherit;
    font-size: 0.95rem;
    transition: all var(--t);
    margin-bottom: 1rem;
  }

  input:focus, textarea:focus, select:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
    background: var(--surface);
  }

  input::placeholder, textarea::placeholder {
    color: var(--text-dim);
  }

  label {
    display: block;
    font-weight: 600;
    font-size: 0.9rem;
    margin-bottom: 0.5rem;
    color: var(--text-light);
  }

  .form-group {
    margin-bottom: 1.5rem;
  }

  .form-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 1.5rem;
  }

  /* ===== ALERTS ===== */
  .alert {
    padding: 1rem;
    border-radius: var(--radius);
    margin-bottom: 1rem;
    display: flex;
    align-items: flex-start;
    gap: 1rem;
  }

  .alert-success {
    background: var(--success-bg);
    border: 1px solid var(--success-border);
    color: var(--success);
  }

  .alert-warning {
    background: var(--warn-bg);
    border: 1px solid var(--warn-border);
    color: var(--warn);
  }

  .alert-danger {
    background: var(--danger-bg);
    border: 1px solid rgba(239, 68, 68, 0.2);
    color: var(--danger);
  }

  .alert-info {
    background: rgba(59, 130, 246, 0.1);
    border: 1px solid rgba(59, 130, 246, 0.2);
    color: var(--accent);
  }

  /* ===== BADGES ===== */
  .badge {
    display: inline-block;
    padding: 0.35rem 0.75rem;
    border-radius: 99px;
    font-size: 0.75rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .badge-primary {
    background: rgba(59, 130, 246, 0.1);
    color: var(--accent);
    border: 1px solid rgba(59, 130, 246, 0.2);
  }

  .badge-success {
    background: var(--success-bg);
    color: var(--success);
    border: 1px solid var(--success-border);
  }

  .badge-warning {
    background: var(--warn-bg);
    color: var(--warn);
    border: 1px solid var(--warn-border);
  }

  .badge-danger {
    background: var(--danger-bg);
    color: var(--danger);
    border: 1px solid rgba(239, 68, 68, 0.2);
  }

  /* ===== TABLES ===== */
  table {
    width: 100%;
    border-collapse: collapse;
    margin: 1rem 0;
  }

  th {
    padding: 1rem;
    text-align: left;
    font-weight: 700;
    background: var(--surface-light);
    border-bottom: 2px solid var(--border);
    color: var(--text-main);
  }

  td {
    padding: 1rem;
    border-bottom: 1px solid var(--border);
  }

  tr:hover {
    background: var(--surface-hover);
  }

  /* ===== GRID ===== */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 1.5rem;
  }

  .grid-2 {
    grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
  }

  /* ===== SECTIONS ===== */
  section {
    padding: 3rem 5%;
    max-width: 1200px;
    margin: 0 auto;
  }

  .section-title {
    font-size: 2rem;
    margin-bottom: 2rem;
    text-align: center;
  }

  /* ===== UTILITIES ===== */
  .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 5%;
  }

  .text-center { text-align: center; }
  .text-muted { color: var(--text-muted); }
  .text-sm { font-size: 0.85rem; }
  .text-lg { font-size: 1.1rem; }

  .mb-1 { margin-bottom: 0.5rem; }
  .mb-2 { margin-bottom: 1rem; }
  .mb-3 { margin-bottom: 1.5rem; }
  .mb-4 { margin-bottom: 2rem; }

  .mt-1 { margin-top: 0.5rem; }
  .mt-2 { margin-top: 1rem; }
  .mt-3 { margin-top: 1.5rem; }
  .mt-4 { margin-top: 2rem; }

  .gap-1 { gap: 0.5rem; }
  .gap-2 { gap: 1rem; }
  .gap-3 { gap: 1.5rem; }

  .flex { display: flex; }
  .flex-center { display: flex; align-items: center; justify-content: center; }
  .flex-between { display: flex; align-items: center; justify-content: space-between; }
  .flex-col { flex-direction: column; }
  .flex-wrap { flex-wrap: wrap; }

  .hidden { display: none !important; }
  .opacity-50 { opacity: 0.5; }
  .cursor-pointer { cursor: pointer; }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 768px) {
    h1 { font-size: 2rem; }
    h2 { font-size: 1.5rem; }
    section { padding: 2rem 5%; }
    .form-row { grid-template-columns: 1fr; }
    .grid { grid-template-columns: 1fr; }
  }
</style>
