<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Set Your Password — HostAI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:      #0D0B10;
      --bg-2:    #131118;
      --surface: #161420;
      --border:  rgba(160,140,220,0.1);
      --border-2:rgba(160,140,220,0.18);
      --accent:  #F5A623;
      --accent-2:#FFD166;
      --accent-glow: rgba(245,166,35,0.35);
      --rose:    #FF6B8A;
      --text-1:  #F0EDF8;
      --text-2:  #9B94B8;
      --text-3:  #5E5875;
      --danger:  #FF6B8A;
      --danger-bg: rgba(255,107,138,0.1);
      --danger-border: rgba(255,107,138,0.25);
      --success: #10D9A8;
      --success-bg: rgba(16,217,168,0.1);
      --success-border: rgba(16,217,168,0.22);
      --radius:  10px;
      --radius-sm: 6px;
      --t: 150ms ease;
    }
    [data-theme="light"] {
      --bg: #F4F2FA; --bg-2: #EAE8F5; --surface: #FFFFFF;
      --border: rgba(80,60,120,0.1); --border-2: rgba(80,60,120,0.16);
      --text-1: #1A1828; --text-2: #54506A; --text-3: #9590A8;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text-1);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      -webkit-font-smoothing: antialiased;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: -20%;
      left: 50%;
      transform: translateX(-50%);
      width: 80vw;
      height: 60vh;
      background: radial-gradient(ellipse at 40% 50%,
        rgba(245,166,35,0.12) 0%,
        rgba(124,111,255,0.07) 45%,
        transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .invite-wrap {
      width: 100%;
      max-width: 420px;
      position: relative;
      z-index: 1;
      animation: fadeUp 0.4s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .brand {
      text-align: center;
      margin-bottom: 2rem;
    }
    .brand-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 52px;
      height: 52px;
      background: linear-gradient(135deg, var(--accent), var(--rose));
      border-radius: 15px;
      font-size: 24px;
      margin-bottom: 0.75rem;
      box-shadow: 0 8px 32px var(--accent-glow);
    }
    .brand h1 {
      font-size: 1.5rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      color: var(--text-1);
    }
    .brand p {
      font-size: 0.82rem;
      color: var(--text-3);
      margin-top: 0.3rem;
      line-height: 1.6;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2rem;
      box-shadow: 0 8px 48px rgba(0,0,0,0.5), 0 0 80px rgba(232,160,32,0.04);
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(232,160,32,0.05) 0%, transparent 60%);
      pointer-events: none;
    }

    .section-title {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      color: var(--text-3);
      margin-bottom: 1.1rem;
    }

    label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text-2);
      margin-bottom: 5px;
    }
    input {
      width: 100%;
      padding: 10px 13px;
      background: var(--bg-2);
      border: 1px solid var(--border-2);
      border-radius: var(--radius-sm);
      font-size: 0.875rem;
      font-family: inherit;
      color: var(--text-1);
      margin-bottom: 1rem;
      outline: none;
      transition: border-color var(--t), box-shadow var(--t);
    }
    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .btn {
      width: 100%;
      padding: 10px 16px;
      border-radius: var(--radius-sm);
      font-size: 0.875rem;
      font-weight: 700;
      cursor: pointer;
      border: none;
      font-family: inherit;
      transition: all var(--t);
      letter-spacing: 0.01em;
    }
    .btn:hover { transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), #C87A10);
      color: #0C0A08;
      font-weight: 700;
      margin-bottom: 0.75rem;
      box-shadow: 0 4px 18px var(--accent-glow);
    }
    .btn-primary:hover { box-shadow: 0 6px 28px var(--accent-glow); color: #0C0A08; }

    .alert {
      padding: 0.65rem 0.9rem;
      border-radius: var(--radius-sm);
      font-size: 0.8rem;
      margin-bottom: 1rem;
      background: var(--danger-bg);
      color: var(--danger);
      border: 1px solid var(--danger-border);
    }

    .info {
      padding: 0.65rem 0.9rem;
      border-radius: var(--radius-sm);
      font-size: 0.8rem;
      margin-bottom: 1rem;
      background: rgba(232, 160, 32, 0.1);
      color: var(--accent-2);
      border: 1px solid rgba(232, 160, 32, 0.25);
    }

    .note {
      font-size: 0.75rem;
      color: var(--text-3);
      text-align: center;
      margin-top: 1.25rem;
      line-height: 1.6;
    }

    .theme-toggle {
      position: fixed;
      top: 1rem;
      right: 1rem;
      width: 36px;
      height: 36px;
      border-radius: 10px;
      border: 1px solid var(--border-2);
      background: var(--surface);
      color: var(--text-2);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      z-index: 10;
      transition: all var(--t);
    }
    .theme-toggle:hover { background: var(--bg-2); }
  </style>
</head>
<body>
  <button class="theme-toggle" id="theme-toggle-btn" title="Toggle theme"><span id="theme-icon">☀️</span></button>

  <div class="invite-wrap">
    <div class="brand">
      <div class="brand-icon">🏠</div>
      <h1>HostAI</h1>
      <p>Welcome to your team account!</p>
    </div>

    <div class="card">
      <div class="info">
        <strong>{{ member_name }}</strong> — set your password to get started
      </div>

      <p class="section-title">Create Your Password</p>

      <form method="post" action="/invite/{{ token }}">
        <input type="hidden" name="csrf_token" value="{{ request.state.csrf_token }}">
        <label>Password</label>
        <input type="password" name="password" placeholder="••••••••" required autocomplete="new-password" minlength="8">
        <label>Confirm Password</label>
        <input type="password" name="password_confirm" placeholder="••••••••" required autocomplete="new-password" minlength="8">
        <button type="submit" class="btn btn-primary">Set Password & Sign In →</button>
      </form>
    </div>

    <p class="note">Your password must be at least 8 characters.</p>
  </div>

  <script nonce="{{ request.state.csp_nonce }}">
    const THEME_KEY = 'hostai-theme';
    function applyTheme(t) {
      document.documentElement.setAttribute('data-theme', t);
      const icon = document.getElementById('theme-icon');
      if (icon) icon.textContent = t === 'dark' ? '☀️' : '🌙';
      localStorage.setItem(THEME_KEY, t);
    }
    function toggleTheme() {
      const cur = document.documentElement.getAttribute('data-theme');
      applyTheme(cur === 'dark' ? 'light' : 'dark');
    }
    (function() {
      const saved = localStorage.getItem(THEME_KEY);
      if (saved) applyTheme(saved);

      const btn = document.getElementById('theme-toggle-btn');
      if (btn) btn.addEventListener('click', toggleTheme);
    })();
  </script>
</body>
</html>
