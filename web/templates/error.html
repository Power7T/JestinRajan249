{% extends "base.html" %}
{% block title %}{{ code }} {{ title }} — HostAI{% endblock %}

{% block content %}
<div class="empty" style="padding: 5rem 1rem">
  <div style="font-size: 3.5rem; font-weight: 800; color: #dee2e6; margin-bottom: 0.5rem">
    {{ code }}
  </div>
  <h1 style="margin-bottom: 0.75rem; font-size: 1.4rem">{{ title }}</h1>
  <p style="max-width: 400px; margin: 0 auto 1.5rem; color: #6c757d; font-size: 0.9rem; line-height: 1.6">
    {{ message }}
  </p>
  <a href="/dashboard" class="btn btn-primary">Go to dashboard</a>
  &nbsp;
  <a href="javascript:history.back()" class="btn btn-outline">Go back</a>
</div>
{% endblock %}
