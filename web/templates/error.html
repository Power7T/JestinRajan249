{% extends "base.html" %}
{% block title %}Error — HostAI{% endblock %}
{% block head %}
<script src="https://cdn.tailwindcss.com?plugins=forms" nonce="{{ request.state.csp_nonce }}"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>body{background:#08090F;font-family:'Plus Jakarta Sans',sans-serif;color:#e3e1eb;}</style>
{% endblock %}
{% block content %}
<div class="min-h-screen flex items-center justify-center px-4">
  <div class="text-center max-w-md">
    <div class="text-8xl font-extrabold text-transparent bg-clip-text bg-gradient-to-br from-[#aec6ff] to-[#5B8DEF] mb-4">
      {{ status_code or 500 }}
    </div>
    <h1 class="text-2xl font-extrabold text-white mb-3">{{ title or "Something went wrong" }}</h1>
    <p class="text-slate-400 text-sm mb-8">{{ detail or "An unexpected error occurred. Please try again." }}</p>
    <div class="flex gap-3 justify-center">
      <a href="/dashboard" class="px-6 py-3 rounded-xl font-bold text-sm text-[#002e6b]" style="background:linear-gradient(135deg,#5B8DEF,#aec6ff)">Go to Dashboard</a>
      <a href="javascript:history.back()" class="px-6 py-3 rounded-xl border border-white/10 text-slate-300 hover:bg-white/5 font-bold text-sm transition-all">&larr; Go back</a>
    </div>
  </div>
</div>
{% endblock %}
