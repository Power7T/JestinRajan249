<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Airbnb Host Assistant{% endblock %}</title>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8f9fa; color: #212529; }
    a { color: #e00b27; text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* Nav */
    nav { background: #fff; border-bottom: 1px solid #dee2e6; padding: 0 1.5rem; display: flex; align-items: center; height: 56px; gap: 1.5rem; }
    nav .brand { font-weight: 700; font-size: 1.1rem; color: #e00b27; margin-right: auto; }
    nav a { color: #495057; font-size: 0.9rem; }
    nav a.active { color: #e00b27; font-weight: 600; }
    nav .logout { color: #adb5bd; font-size: 0.85rem; }

    /* Layout */
    .container { max-width: 960px; margin: 0 auto; padding: 2rem 1rem; }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 1.25rem; }
    h2 { font-size: 1.15rem; font-weight: 600; margin-bottom: 1rem; }

    /* Cards */
    .card { background: #fff; border: 1px solid #dee2e6; border-radius: 8px; padding: 1.25rem; margin-bottom: 1rem; }
    .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.75rem; }
    .card-title { font-weight: 600; font-size: 0.95rem; }
    .card-meta { font-size: 0.78rem; color: #6c757d; }

    /* Badges */
    .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 0.72rem; font-weight: 600; text-transform: uppercase; }
    .badge-routine  { background: #d1ecf1; color: #0c5460; }
    .badge-complex  { background: #fff3cd; color: #856404; }
    .badge-email    { background: #e2e3e5; color: #383d41; }
    .badge-calendar { background: #d4edda; color: #155724; }
    .badge-ok       { background: #d4edda; color: #155724; }
    .badge-off      { background: #f8d7da; color: #721c24; }

    /* Draft text */
    .draft-text { background: #f8f9fa; border-radius: 4px; padding: 0.75rem; font-size: 0.875rem; line-height: 1.6; white-space: pre-wrap; margin-bottom: 0.75rem; }

    /* Buttons */
    .btn { display: inline-block; padding: 6px 14px; border-radius: 6px; font-size: 0.85rem; font-weight: 600; cursor: pointer; border: none; }
    .btn-primary   { background: #e00b27; color: #fff; }
    .btn-secondary { background: #6c757d; color: #fff; }
    .btn-success   { background: #28a745; color: #fff; }
    .btn-outline   { background: transparent; border: 1px solid #dee2e6; color: #495057; }
    .btn:hover { opacity: 0.88; }
    .btn-sm { padding: 4px 10px; font-size: 0.8rem; }

    /* Form */
    label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 4px; }
    input[type=text], input[type=email], input[type=password], textarea, select {
      width: 100%; padding: 8px 10px; border: 1px solid #ced4da; border-radius: 6px;
      font-size: 0.875rem; margin-bottom: 1rem; background: #fff;
    }
    textarea { resize: vertical; min-height: 80px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .form-section { margin-bottom: 2rem; }
    .help-text { font-size: 0.78rem; color: #6c757d; margin-top: -0.75rem; margin-bottom: 1rem; }

    /* Alert */
    .alert { padding: 0.75rem 1rem; border-radius: 6px; margin-bottom: 1rem; font-size: 0.875rem; }
    .alert-success { background: #d4edda; color: #155724; }
    .alert-error   { background: #f8d7da; color: #721c24; }
    .alert-info    { background: #d1ecf1; color: #0c5460; }

    /* Empty state */
    .empty { text-align: center; padding: 3rem 1rem; color: #6c757d; }
    .empty-icon { font-size: 2.5rem; margin-bottom: 0.5rem; }

    /* Table */
    table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
    th, td { padding: 0.6rem 0.75rem; text-align: left; border-bottom: 1px solid #dee2e6; }
    th { font-weight: 600; background: #f8f9fa; }

    /* Status bar */
    .status-bar { display: flex; gap: 1rem; padding: 0.5rem 0; margin-bottom: 1.25rem; font-size: 0.8rem; }
    .status-item { display: flex; align-items: center; gap: 4px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; }
    .dot-green { background: #28a745; }
    .dot-red   { background: #dc3545; }
    .dot-grey  { background: #adb5bd; }

    @media (max-width: 600px) {
      .form-row { grid-template-columns: 1fr; }
      nav { gap: 1rem; }
    }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
{% block nav %}
<nav>
  <span class="brand">🏠 HostAI</span>
  <a href="/dashboard" class="{% if request.url.path == '/dashboard' %}active{% endif %}">Dashboard</a>
  <a href="/activity"  class="{% if request.url.path == '/activity' %}active{% endif %}">Activity</a>
  <a href="/settings"  class="{% if request.url.path == '/settings' %}active{% endif %}">Settings</a>
  <a href="/billing"   class="{% if request.url.path == '/billing' %}active{% endif %}">Billing</a>
  <a href="/logout" class="logout">Sign out</a>
</nav>
{% endblock %}
<div class="container">
  {% block content %}{% endblock %}
</div>
</body>
</html>
