# Alembic configuration file for HostAI DB migrations.
# Run from the project root:
#   alembic upgrade head         # apply all pending migrations
#   alembic revision --autogenerate -m "description"  # create new migration
#   alembic downgrade -1         # roll back one migration
#   alembic history              # list migration history

[alembic]
script_location = web/alembic
prepend_sys_path = .

# %(here)s = directory containing alembic.ini
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(slug)s

# Timezone used when generating new revision IDs.
timezone = UTC

# Connection string — override with DATABASE_DIRECT_URL env var for migrations
# (bypass PgBouncer; use direct postgres connection for DDL statements)
sqlalchemy.url = postgresql://hostai:password@localhost:5432/hostai

[post_write_hooks]
# Optionally format generated migrations with black:
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 100

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
