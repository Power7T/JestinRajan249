[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Use entrypoint.sh which waits for DB, runs migrations, then starts app.
# Railway injects DATABASE_URL and REDIS_URL automatically from linked services.
startCommand = "sh /app/entrypoint.sh"

# During startup: use /startup (lightweight, no DB dependency)
# After app is stable: Railway switches to /health (full check with DB + Redis)
healthcheckPath = "/startup"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
numReplicas = 1

# ---------------------------------------------------------------------------
# Required environment variables — set these in the Railway dashboard:
# ---------------------------------------------------------------------------
# DATABASE_URL          Auto-injected by Railway Postgres plugin
# REDIS_URL             Auto-injected by Railway Redis plugin
# SECRET_KEY            Random 64-char string  (openssl rand -hex 32)
# ENCRYPTION_KEY        Fernet key             (python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())")
# APP_BASE_URL          https://your-app.up.railway.app
# ENVIRONMENT           production
# SMTP_HOST             e.g. smtp.gmail.com
# SMTP_PORT             587
# SMTP_USER             your@email.com
# SMTP_PASS             Gmail App Password or SMTP password
# SMTP_FROM             noreply@yourdomain.com
# STRIPE_SECRET_KEY     sk_live_...
# STRIPE_WEBHOOK_SECRET whsec_...
# SENTRY_DSN            https://...@sentry.io/...   (optional but recommended)
# METRICS_TOKEN         Random string to protect /metrics endpoint
# ADMIN_EMAILS          comma-separated admin email addresses
