# HostAI — Fly.io deployment config
# Deploy: fly launch (first time) or fly deploy (updates)
# Docs: https://fly.io/docs/reference/configuration/

app            = "hostai"
primary_region = "ord"        # Chicago — change to nearest: lhr (London), sin (Singapore), syd (Sydney)
kill_signal    = "SIGINT"
kill_timeout   = "5s"

[build]
  dockerfile = "web/Dockerfile"

[env]
  PORT        = "8000"
  ENVIRONMENT = "production"

# Secrets (set via: fly secrets set KEY=value)
# Required secrets:
#   fly secrets set SECRET_KEY=$(openssl rand -hex 32)
#   fly secrets set FIELD_ENCRYPTION_KEY=$(openssl rand -hex 32)
#   fly secrets set DATABASE_URL=postgresql://...
#   fly secrets set REDIS_URL=redis://...
#   fly secrets set STRIPE_SECRET_KEY=sk_live_...
#   fly secrets set STRIPE_WEBHOOK_SECRET=whsec_...
#   fly secrets set SMTP_HOST=smtp.gmail.com SMTP_USER=you@gmail.com SMTP_PASS=...
# Optional:
#   fly secrets set SENTRY_DSN=https://...
#   fly secrets set ADMIN_EMAILS=admin@yourdomain.com

[http_service]
  internal_port       = 8000
  force_https         = true
  auto_stop_machines  = false   # keep alive (workers need to run continuously)
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type       = "requests"
    hard_limit = 200
    soft_limit = 150

  [[http_service.checks]]
    grace_period = "15s"
    interval     = "15s"
    method       = "GET"
    path         = "/ping"
    timeout      = "5s"

[[vm]]
  memory   = "512mb"
  cpu_kind = "shared"
  cpus     = 1

[deploy]
  strategy = "rolling"

# Mount persistent volume for uploads (optional — remove if using S3/object storage)
# [[mounts]]
#   source      = "hostai_data"
#   destination = "/data"

# ── Free tier databases ────────────────────────────────────────────────────
# PostgreSQL (Fly managed — free 3GB):
#   fly postgres create --name hostai-db --region ord
#   fly postgres attach --app hostai hostai-db
#
# Redis (Upstash — free 256MB):
#   fly ext redis create (or sign up at https://upstash.com and paste REDIS_URL as secret)
# ──────────────────────────────────────────────────────────────────────────
