worker_processes auto;
worker_rlimit_nofile 65536;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Performance ──────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    keepalive_requests 1000;

    # Docker DNS resolver (enables dynamic upstream resolution)
    resolver 127.0.0.11 valid=10s;
    resolver_timeout 5s;

    # ── Upstream: FastAPI app ────────────────────────────────
    upstream web {
        server web:8000 resolve;
        keepalive 32;          # reuse upstream connections
    }

    # ── Cloudflare real IP restoration ───────────────────────
    # When traffic comes through Cloudflare, the connecting IP is a Cloudflare
    # edge node. These ranges tell Nginx to trust CF-Connecting-IP as the real IP.
    # Update ranges at: https://www.cloudflare.com/ips/
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 2400:cb00::/32;
    set_real_ip_from 2606:4700::/32;
    set_real_ip_from 2803:f800::/32;
    set_real_ip_from 2405:b500::/32;
    set_real_ip_from 2405:8100::/32;
    set_real_ip_from 2a06:98c0::/29;
    set_real_ip_from 2c0f:f248::/32;
    real_ip_header CF-Connecting-IP;
    real_ip_recursive on;

    # ── Gzip ────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   5;
    gzip_min_length   256;
    gzip_types
        text/plain text/css text/javascript
        application/json application/javascript
        image/svg+xml;

    # ── Logging ──────────────────────────────────────────────
    log_format main '$remote_addr - [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$request_time';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log  warn;

    # ── Rate limiting zones ──────────────────────────────────
    # General: 20 req/s per IP (burst up to 60 queued)
    limit_req_zone $binary_remote_addr zone=general:10m  rate=20r/s;
    # Auth endpoints: 5 req/30s per IP (hard limit on login/signup)
    limit_req_zone $binary_remote_addr zone=auth:5m      rate=5r/30s;
    # Webhooks: 100 req/s (Stripe + Meta + Twilio call us quickly)
    limit_req_zone $binary_remote_addr zone=webhook:5m   rate=100r/s;
    # Suppress 429 log noise
    limit_req_status 429;

    # ── HTTP → HTTPS redirect (certbot ACME exempt) ──────────
    server {
        listen 80;
        server_name _;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS ────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name YOUR_DOMAIN;   # ← set via deploy.sh or manually

        # TLS
        ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:20m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;
        ssl_stapling        on;
        ssl_stapling_verify on;

        # Security headers (belt-and-suspenders; app also sends these)
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload"                                                                                                                                   always;
        add_header X-Frame-Options           "DENY"                                                                                                                                                                           always;
        add_header X-Content-Type-Options    "nosniff"                                                                                                                                                                        always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin"                                                                                                                                                always;
        add_header Content-Security-Policy   "default-src 'self'; script-src 'self' https://unpkg.com 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none';" always;
        add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()"                                                                                                                                       always;

        # Request limits
        client_max_body_size 4m;
        client_body_timeout  15s;
        client_header_timeout 15s;
        send_timeout         15s;

        # ── Static files (long-lived cache) ──────────────────
        location /static/ {
            proxy_pass http://web;
            proxy_cache_valid 200 1y;
            add_header Cache-Control "public, immutable, max-age=31536000";
            access_log off;
        }

        # ── Stripe / Meta / Twilio webhooks (high rate, no browser CSRF) ──
        location ~ ^/(billing/stripe-webhook|wa/webhook/|sms/webhook/) {
            limit_req zone=webhook burst=200 nodelay;
            proxy_pass         http://web;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        # ── Auth endpoints (strict rate limit) ───────────────
        location ~ ^/(login|signup)$ {
            limit_req zone=auth burst=3 nodelay;
            proxy_pass         http://web;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 15s;
        }

        # ── All other traffic ────────────────────────────────
        location / {
            limit_req zone=general burst=60 nodelay;
            proxy_pass         http://web;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";   # enable upstream keepalive
            proxy_connect_timeout 10s;
            proxy_read_timeout    60s;
            proxy_send_timeout    15s;
        }
    }
}
