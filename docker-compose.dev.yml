# ============================================================
# HostAI — Local Development Stack
# Usage: docker compose -f docker-compose.dev.yml up
#
# Differences from production:
#   - No Nginx / no SSL (app runs on http://localhost:8000)
#   - No PgBouncer (app connects directly to PostgreSQL)
#   - No read replica
#   - No Certbot
#   - No db-backup
#   - Hot-reload via uvicorn --reload (code mounted into container)
#   - SQLite NOT used — keep parity with prod (PostgreSQL)
# ============================================================

services:

  # ── PostgreSQL (single node, no replica) ─────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       hostai
      POSTGRES_USER:     hostai
      POSTGRES_PASSWORD: devpassword
    ports:
      - "5432:5432"     # exposed so you can connect with psql / DBeaver
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hostai"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Web App (hot-reload mode) ─────────────────────────────
  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL:         postgresql://hostai:devpassword@db:5432/hostai
      DATABASE_REPLICA_URL: ""
      REDIS_URL:            redis://redis:6379/0
      SECRET_KEY:           dev-secret-key-change-in-production
      FIELD_ENCRYPTION_KEY: mR1ZucKnK-yZ83VUfz7ziQIkP61-5ZW9Re0MsDzx75o=
      APP_BASE_URL:         http://localhost:8000
      ENVIRONMENT:          development
      # Email (optional for local dev — leave blank to skip)
      SMTP_HOST:            ""
      SMTP_PORT:            "587"
      SMTP_USER:            ""
      SMTP_PASS:            ""
      SMTP_FROM:            ""
      # Stripe (use test keys from https://dashboard.stripe.com/test)
      STRIPE_SECRET_KEY:       ""
      STRIPE_WEBHOOK_SECRET:   ""
      STRIPE_PRICE_BAILEYS:    ""
      STRIPE_PRICE_META_CLOUD: ""
      STRIPE_PRICE_SMS:        ""
      STRIPE_PRICE_PRO:        ""
      WORKERS: "1"
      PORT:    "8000"
    ports:
      - "8000:8000"
    volumes:
      # Mount source for hot-reload
      - ./web:/app/web:ro
      - ./airbnb-host/SKILL.md:/app/airbnb-host/SKILL.md:ro
    command: >
      uvicorn web.app:app
        --host 0.0.0.0
        --port 8000
        --reload
        --reload-dir /app/web
        --log-level info
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  pgdata_dev:
