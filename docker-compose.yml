version: "3.9"

# ============================================================
# HostAI — Full Production Stack
# Deploy:  cp .env.example .env && nano .env && ./deploy.sh
# Update:  git pull && ./deploy.sh
# ============================================================

# Shared log driver — all containers cap at 5×50 MB = 250 MB per service
x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "50m"
    max-file: "5"

services:

  # ── PostgreSQL ──────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       hostai
      POSTGRES_USER:     hostai
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [\"CMD-SHELL\", \"pg_isready -U hostai\"]
      interval: 10s
      timeout: 5s
      retries: 5
    # DB is internal-only; never expose port 5432 to the host
    expose:
      - "5432"
    logging: *default-logging

  # ── Redis (shared state: rate limiting, Baileys queue) ───────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  # ── Web App (FastAPI + Uvicorn) ─────────────────────────────
  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL:          postgresql://hostai:${POSTGRES_PASSWORD}@db:5432/hostai
      REDIS_URL:             redis://redis:6379/0
      SECRET_KEY:            ${SECRET_KEY:?SECRET_KEY required}
      FIELD_ENCRYPTION_KEY:  ${FIELD_ENCRYPTION_KEY:?FIELD_ENCRYPTION_KEY required}
      APP_BASE_URL:          ${APP_BASE_URL:-https://localhost}
      ENVIRONMENT:           ${ENVIRONMENT:-production}
      # SMTP (for email verification + password reset)
      SMTP_HOST:             ${SMTP_HOST:-}
      SMTP_PORT:             ${SMTP_PORT:-587}
      SMTP_USER:             ${SMTP_USER:-}
      SMTP_PASS:             ${SMTP_PASS:-}
      SMTP_FROM:             ${SMTP_FROM:-}
      # Stripe
      STRIPE_SECRET_KEY:     ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRICE_BAILEYS:  ${STRIPE_PRICE_BAILEYS:-}
      STRIPE_PRICE_META_CLOUD: ${STRIPE_PRICE_META_CLOUD:-}
      STRIPE_PRICE_SMS:      ${STRIPE_PRICE_SMS:-}
      STRIPE_PRICE_PRO:      ${STRIPE_PRICE_PRO:-}
      # Monitoring
      SENTRY_DSN:            ${SENTRY_DSN:-}
      WORKERS:               ${WORKERS:-2}
      PORT:                  8000
    volumes:
      - ./SKILL.md:/app/SKILL.md:ro
      - ./airbnb-host/SKILL.md:/app/airbnb-host/SKILL.md:ro
    expose:
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging: *default-logging

  # ── Nginx (TLS termination + reverse proxy) ─────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - letsencrypt:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    healthcheck:
      test: ["CMD-SHELL", "nginx -t 2>/dev/null && curl -sf http://localhost/health || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
    logging: *default-logging

  # ── Certbot — initial SSL + automatic renewal ────────────────
  # First-time: docker compose --profile ssl run --rm certbot-init
  # Auto-renewal runs in the background as a long-lived service.
  certbot-init:
    image: certbot/certbot:latest
    profiles: ["ssl"]
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: >
      certbot certonly --webroot
      --webroot-path=/var/www/certbot
      --email ${CERTBOT_EMAIL:-admin@example.com}
      --agree-tos
      --no-eff-email
      -d ${DOMAIN:-example.com}

  certbot-renew:
    image: certbot/certbot:latest
    restart: unless-stopped
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    # Attempt renewal every 12h; certbot only acts when cert is <30d from expiry
    entrypoint: >
      /bin/sh -c "trap exit TERM;
      while :; do
        certbot renew --webroot --webroot-path=/var/www/certbot --quiet;
        sleep 12h & wait $${!};
      done"
    logging: *default-logging

  # ── PostgreSQL automated daily backups ───────────────────────
  db-backup:
    image: postgres:16-alpine
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgbackups:/backups
    # Dump daily at 03:00 UTC; keep last 7 days
    entrypoint: >
      /bin/sh -c "trap exit TERM;
      while :; do
        FNAME=/backups/hostai_$$(date +%Y%m%d_%H%M%S).sql.gz;
        pg_dump -h db -U hostai hostai | gzip > $$FNAME
          && echo \"Backup OK: $$FNAME\"
          || echo \"Backup FAILED\";
        find /backups -name '*.sql.gz' -mtime +7 -delete;
        sleep 24h & wait $${!};
      done"
    logging: *default-logging

volumes:
  pgdata:
  redisdata:
  letsencrypt:
  certbot_www:
  pgbackups:
