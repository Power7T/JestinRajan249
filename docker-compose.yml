version: "3.9"

# ============================================================
# Airbnb Host Assistant — Full Production Stack
# Deploy:  cp .env.example .env && nano .env && ./deploy.sh
# Update:  git pull && ./deploy.sh
# ============================================================

services:

  # ── PostgreSQL ──────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       hostai
      POSTGRES_USER:     hostai
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hostai"]
      interval: 10s
      timeout: 5s
      retries: 5
    # DB is internal-only; never expose port 5432 to the host
    expose:
      - "5432"

  # ── Web App (FastAPI + Uvicorn) ─────────────────────────────
  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL:          postgresql://hostai:${POSTGRES_PASSWORD}@db:5432/hostai
      SECRET_KEY:            ${SECRET_KEY:?SECRET_KEY required}
      FIELD_ENCRYPTION_KEY:  ${FIELD_ENCRYPTION_KEY:?FIELD_ENCRYPTION_KEY required}
      APP_BASE_URL:          ${APP_BASE_URL:-https://localhost}
      STRIPE_SECRET_KEY:     ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRICE_BAILEYS:  ${STRIPE_PRICE_BAILEYS:-}
      STRIPE_PRICE_META_CLOUD: ${STRIPE_PRICE_META_CLOUD:-}
      STRIPE_PRICE_SMS:      ${STRIPE_PRICE_SMS:-}
      STRIPE_PRICE_PRO:      ${STRIPE_PRICE_PRO:-}
      WORKERS:               ${WORKERS:-2}
      PORT:                  8000
    volumes:
      - ./SKILL.md:/app/SKILL.md:ro
      - ./airbnb-host/SKILL.md:/app/airbnb-host/SKILL.md:ro
    expose:
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Nginx (TLS termination + reverse proxy) ─────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - letsencrypt:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    healthcheck:
      test: ["CMD-SHELL", "nginx -t 2>/dev/null && curl -sf http://localhost/health || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3

  # ── Certbot (Let's Encrypt — run once, then renew via cron) ─
  certbot:
    image: certbot/certbot:latest
    profiles: ["ssl"]      # only started with: docker compose --profile ssl run certbot
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: >
      certbot certonly --webroot
      --webroot-path=/var/www/certbot
      --email ${CERTBOT_EMAIL:-admin@example.com}
      --agree-tos
      --no-eff-email
      -d ${DOMAIN:-example.com}

volumes:
  pgdata:
  letsencrypt:
  certbot_www:
