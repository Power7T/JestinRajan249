# ============================================================
# HostAI — Full Production Stack
# Deploy:  cp .env.example .env && nano .env && ./deploy.sh
# Update:  ./update.sh   (zero-downtime)
# ============================================================

# Shared log driver — all containers cap at 5×50 MB = 250 MB per service
x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "50m"
    max-file: "5"

services:

  # ── PostgreSQL Primary ───────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    # Enable WAL streaming replication so the replica can follow in real time
    command: >
      postgres
      -c wal_level=replica
      -c max_wal_senders=3
      -c wal_keep_size=256MB
      -c hot_standby=on
    environment:
      POSTGRES_DB:                   hostai
      POSTGRES_USER:                 hostai
      POSTGRES_PASSWORD:             ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
      POSTGRES_REPLICATION_USER:     replicator
      POSTGRES_REPLICATION_PASSWORD: ${REPLICATION_PASSWORD:-}
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Creates replication user + pg_hba.conf entry on first init
      - ./postgres/init-replication.sh:/docker-entrypoint-initdb.d/01-replication.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hostai"]
      interval: 10s
      timeout: 5s
      retries: 5
    expose:
      - "5432"
    logging: *default-logging

  # ── PgBouncer — connection pooler (DISABLED FOR LOCAL DEV) ────────────────────────────
  # Sits between the app and PostgreSQL; pools connections in transaction mode.
  # Lets you run many Uvicorn workers + background threads without exhausting
  # PostgreSQL's max_connections (default 100).
  # pgbouncer:
  #   image: bitnami/pgbouncer:1
  #   restart: unless-stopped
  #   depends_on:
  #     db:
  #       condition: service_healthy
  #   environment:
  #     POSTGRESQL_HOST:              db
  #     POSTGRESQL_PORT:              5432
  #     POSTGRESQL_DATABASE:          hostai
  #     POSTGRESQL_USERNAME:          hostai
  #     POSTGRESQL_PASSWORD:          ${POSTGRES_PASSWORD}
  #     PGBOUNCER_DATABASE:           hostai
  #     PGBOUNCER_POOL_MODE:          transaction
  #     PGBOUNCER_MAX_CLIENT_CONN:    200
  #     PGBOUNCER_DEFAULT_POOL_SIZE:  20
  #     PGBOUNCER_MIN_POOL_SIZE:      5
  #     PGBOUNCER_RESERVE_POOL_SIZE:  5
  #     PGBOUNCER_AUTH_TYPE:          scram-sha-256
  #   expose:
  #     - "5432"
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432 -U hostai"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5
  #   logging: *default-logging

  # ── PostgreSQL Replica (streaming standby) ───────────────────
  # Hot standby — receives WAL from primary, available for SELECT queries.
  # The web app routes dashboard + activity log queries here via DATABASE_REPLICA_URL.
  # Enable by setting REPLICATION_PASSWORD in .env.
  # Skip this service (comment it out) if you don't need read scaling yet.
  db-replica:
    image: postgres:16-alpine
    restart: unless-stopped
    profiles: ["replica"]          # opt-in: docker compose --profile replica up
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGPASSWORD:                    ${POSTGRES_PASSWORD}
      REPL_PASSWORD:                 ${REPLICATION_PASSWORD:-}
      POSTGRES_REPLICATION_USER:     replicator
      PRIMARY_HOST:                  db
      PRIMARY_PORT:                  5432
    volumes:
      - pgreplica:/var/lib/postgresql/data
      - ./scripts/replica-entrypoint.sh:/replica-entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/replica-entrypoint.sh"]
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hostai"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s   # allow time for pg_basebackup on first start
    logging: *default-logging

  # ── Redis (shared state: rate limiting, Baileys queue) ───────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  # ── Web App (FastAPI + Uvicorn) ─────────────────────────────
  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Write path goes directly to database (pgbouncer disabled)
      DATABASE_URL:            postgresql://hostai:${POSTGRES_PASSWORD}@db:5432/hostai
      DATABASE_DIRECT_URL:     postgresql://hostai:${POSTGRES_PASSWORD}@db:5432/hostai
      # Read path goes directly to replica when available (bypasses PgBouncer for selects)
      DATABASE_REPLICA_URL:    ${DATABASE_REPLICA_URL:-}
      REDIS_URL:               redis://redis:6379/0
      SECRET_KEY:              ${SECRET_KEY:?SECRET_KEY required}
      FIELD_ENCRYPTION_KEY:    ${FIELD_ENCRYPTION_KEY:?FIELD_ENCRYPTION_KEY required}
      APP_BASE_URL:            ${APP_BASE_URL:-https://localhost}
      ENVIRONMENT:             ${ENVIRONMENT:-production}
      TRUST_PROXY_HEADERS:     ${TRUST_PROXY_HEADERS:-1}
      RUN_EMBEDDED_WORKERS:    "0"
      AUTO_CREATE_TABLES:      "0"
      AUTO_MIGRATE:            "1"
      ADMIN_EMAILS:            ${ADMIN_EMAILS:-}
      SESSION_HOURS:           ${SESSION_HOURS:-72}
      META_APP_SECRET:         ${META_APP_SECRET:-}
      INBOUND_EMAIL_DOMAIN:    ${INBOUND_EMAIL_DOMAIN:-inbound.hostai.local}
      INBOUND_PARSE_WEBHOOK_SECRET: ${INBOUND_PARSE_WEBHOOK_SECRET:-}
      METRICS_TOKEN:           ${METRICS_TOKEN:-}
      METRICS_PUBLIC:          ${METRICS_PUBLIC:-}
      INBOUND_PARSE_PROVIDER:  ${INBOUND_PARSE_PROVIDER:-}
      MAILGUN_SIGNING_KEY:     ${MAILGUN_SIGNING_KEY:-}
      POSTMARK_INBOUND_SECRET: ${POSTMARK_INBOUND_SECRET:-}
      INBOUND_PARSE_MAX_AGE:   ${INBOUND_PARSE_MAX_AGE:-300}
      INBOUND_PARSE_REQUIRE_REPLAY: ${INBOUND_PARSE_REQUIRE_REPLAY:-1}
      # SMTP (for email verification + password reset)
      SMTP_HOST:               ${SMTP_HOST:-}
      SMTP_PORT:               ${SMTP_PORT:-587}
      SMTP_USER:               ${SMTP_USER:-}
      SMTP_PASS:               ${SMTP_PASS:-}
      SMTP_FROM:               ${SMTP_FROM:-}
      # Stripe
      STRIPE_SECRET_KEY:       ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET:   ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRICE_BAILEYS:    ${STRIPE_PRICE_BAILEYS:-}
      STRIPE_PRICE_META_CLOUD: ${STRIPE_PRICE_META_CLOUD:-}
      STRIPE_PRICE_SMS:        ${STRIPE_PRICE_SMS:-}
      STRIPE_PRICE_PRO:        ${STRIPE_PRICE_PRO:-}
      # Monitoring
      SENTRY_DSN:              ${SENTRY_DSN:-}
      WORKERS:                 ${WORKERS:-2}
      PORT:                    8000
    volumes:
      - ./SKILL.md:/app/SKILL.md:ro
      - ./airbnb-host/SKILL.md:/app/airbnb-host/SKILL.md:ro
    ports:
      - "8000:8000"
    expose:
      - "8000"
    healthcheck:
      # Use /ping (no DB hit) so the health check never causes false failures
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/ping || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging: *default-logging

  # ── Background Workers (IMAP, scheduler, PMS sync) ──────────
  worker:
    build:
      context: .
      dockerfile: web/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL:            postgresql://hostai:${POSTGRES_PASSWORD}@db:5432/hostai
      DATABASE_DIRECT_URL:     postgresql://hostai:${POSTGRES_PASSWORD}@db:5432/hostai
      DATABASE_REPLICA_URL:    ${DATABASE_REPLICA_URL:-}
      REDIS_URL:               redis://redis:6379/0
      SECRET_KEY:              ${SECRET_KEY:?SECRET_KEY required}
      FIELD_ENCRYPTION_KEY:    ${FIELD_ENCRYPTION_KEY:?FIELD_ENCRYPTION_KEY required}
      APP_BASE_URL:            ${APP_BASE_URL:-https://localhost}
      ENVIRONMENT:             ${ENVIRONMENT:-production}
      TRUST_PROXY_HEADERS:     ${TRUST_PROXY_HEADERS:-1}
      RUN_EMBEDDED_WORKERS:    "1"
      AUTO_CREATE_TABLES:      "0"
      AUTO_MIGRATE:            "0"
      ADMIN_EMAILS:            ${ADMIN_EMAILS:-}
      SESSION_HOURS:           ${SESSION_HOURS:-72}
      META_APP_SECRET:         ${META_APP_SECRET:-}
      INBOUND_EMAIL_DOMAIN:    ${INBOUND_EMAIL_DOMAIN:-inbound.hostai.local}
      INBOUND_PARSE_WEBHOOK_SECRET: ${INBOUND_PARSE_WEBHOOK_SECRET:-}
      INBOUND_PARSE_PROVIDER:  ${INBOUND_PARSE_PROVIDER:-}
      MAILGUN_SIGNING_KEY:     ${MAILGUN_SIGNING_KEY:-}
      POSTMARK_INBOUND_SECRET: ${POSTMARK_INBOUND_SECRET:-}
      INBOUND_PARSE_MAX_AGE:   ${INBOUND_PARSE_MAX_AGE:-300}
      INBOUND_PARSE_REQUIRE_REPLAY: ${INBOUND_PARSE_REQUIRE_REPLAY:-1}
      # SMTP (for verification + password reset)
      SMTP_HOST:               ${SMTP_HOST:-}
      SMTP_PORT:               ${SMTP_PORT:-587}
      SMTP_USER:               ${SMTP_USER:-}
      SMTP_PASS:               ${SMTP_PASS:-}
      SMTP_FROM:               ${SMTP_FROM:-}
      # Stripe (for webhook verification)
      STRIPE_SECRET_KEY:       ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET:   ${STRIPE_WEBHOOK_SECRET:-}
      # Monitoring
      SENTRY_DSN:              ${SENTRY_DSN:-}
    command: python -m web.worker_runner
    logging: *default-logging

  # ── Nginx (TLS termination + reverse proxy) ─────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - letsencrypt:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    healthcheck:
      test: ["CMD-SHELL", "nginx -t 2>/dev/null && curl -sf http://localhost/ping || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
    logging: *default-logging

  # ── Certbot — initial SSL + automatic renewal ────────────────
  certbot-init:
    image: certbot/certbot:latest
    profiles: ["ssl"]
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: >
      certbot certonly --webroot
      --webroot-path=/var/www/certbot
      --email ${CERTBOT_EMAIL:-admin@example.com}
      --agree-tos
      --no-eff-email
      -d ${DOMAIN:-example.com}

  certbot-renew:
    image: certbot/certbot:latest
    restart: unless-stopped
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: >
      /bin/sh -c "trap exit TERM;
      while :; do
        certbot renew --webroot --webroot-path=/var/www/certbot --quiet;
        sleep 12h & wait $${!};
      done"
    logging: *default-logging

  # ── PostgreSQL automated daily backups ───────────────────────
  db-backup:
    image: postgres:16-alpine
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgbackups:/backups
    entrypoint: >
      /bin/sh -c "set -o pipefail; trap exit TERM;
      while :; do
        FNAME=/backups/hostai_$$(date +%Y%m%d_%H%M%S).sql.gz;
        pg_dump -h db -U hostai hostai | gzip > $$FNAME
          && echo \"Backup OK: $$FNAME\"
          || { echo \"Backup FAILED\"; rm -f $$FNAME; };
        find /backups -name '*.sql.gz' -mtime +7 -delete;
        sleep 24h & wait $${!};
      done"
    logging: *default-logging

volumes:
  pgdata:
  pgreplica:
  redisdata:
  letsencrypt:
  certbot_www:
  pgbackups:
