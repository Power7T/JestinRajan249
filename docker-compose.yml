version: "3.9"

# ============================================================
# Airbnb Host Assistant — Full Stack
# Deploy with: docker compose up -d
# ============================================================

services:

  # ── PostgreSQL ──────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       hostai
      POSTGRES_USER:     hostai
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hostai"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Web App (FastAPI) ────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL:          postgresql://hostai:${POSTGRES_PASSWORD:-changeme}@db:5432/hostai
      SECRET_KEY:            ${SECRET_KEY:-change-me-in-production}
      FIELD_ENCRYPTION_KEY:  ${FIELD_ENCRYPTION_KEY:-}
      PORT:                  8000
    volumes:
      # Mount SKILL.md so classifier can read it at runtime
      - ./SKILL.md:/app/SKILL.md:ro
      - ./airbnb-host/SKILL.md:/app/airbnb-host/SKILL.md:ro
    expose:
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Nginx (reverse proxy + SSL) ──────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - letsencrypt:/etc/letsencrypt:ro
    healthcheck:
      test: ["CMD-SHELL", "nginx -t"]
      interval: 60s
      timeout: 5s
      retries: 3

volumes:
  pgdata:
  letsencrypt:
